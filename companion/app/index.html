<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>code-rookie · companion</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="app" class="app">
      <header class="topbar">
        <button id="menu-toggle" class="menu-toggle" aria-label="Toggle menu">☰</button>
        <div class="brand" data-nav="home">
          <span class="brand-mark">▚</span>
          <span class="brand-name">code-rookie</span>
          <span class="brand-sub">companion</span>
        </div>
        <div class="stats" id="stats"></div>
      </header>
      <aside class="sidebar" id="sidebar"></aside>
      <main class="main" id="main"></main>
    </div>
    <div id="modal-root"></div>

    <!-- content.js is generated by `npm run build`; it sets window.CODE_ROOKIE_DATA.
         Loaded as a plain script (not fetched) so the app works from file:// too. -->
    <script src="content.js"></script>
    <script src="app.js"></script>
  </body>
</html>
